  <style>
:root{
  --primary-color: #5a91ff;
  --text-color:rgb(255, 255, 255);
  --secondary-color: rgb(245, 242, 188);
  --defpad:23px;
  --defop:0.5;
}

body{
  background-color: var(--secondary-color);

}

  nav {
    background-color:var(--primary-color);
    padding:5px;
  }
  
*{
  margin: 0;
  padding: 0;
  font-family: "Poppins", sans-serif;
}

    ul li{
      list-style: none;
      display: inline;
      padding:20px;
      font: weight 400px;
      color:var(--text-color);
    }

    ul li a{
      color: var(--text-color);
      text-decoration: none;
    }

  </style>
</head>
<body>
<header>
  <nav>
    <ul>
   <a href="https://www.bmw-m.com" target="_blank">  <img src="bmw.jpg" alt="Logo" style="height: 30px; width: 30px; border-radius: 50%";></a> 
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Contact Us</a></li>
    </ul>
  </nav>
</header>
</body>
</html>
