<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 6 - Navbar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: rgb(32, 32, 32);
        }

        section {
            display: flex;
        }

        header {
            background-color: white;
            padding: 20px 140px;
            position: sticky;
            top: 0;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo img {
            width: 170px;
            height: 56px;
        }

        ul {
            list-style: none;
            display: flex;
        }

        a {
            text-decoration: none;
            color: rgb(63, 63, 63);
        }

        li {
            margin: 0 10px;
            font-size: 15px;
        }

        li img {
            width: 24px;
            height: 24px;
        }

        select {
            border: none;
        }

        .left {
            padding: 70px;
        }



        p {
            color: white;
            width: 40vw;
            margin: 50px 0px;
            font-size: 22px;
            line-height: 1.5;
        }

        .btn {
            min-height: 70px;
            min-width: 250px;
            border-radius: 5px;
            margin: 0 10px;
            color: white;
            font-size: 25px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn1 {
            background-color: rgb(7, 167, 211);
            border: none;
        }

        .btn2 {
            background-color: rgb(32, 32, 32);
            border: 3px white solid;
        }

        .updates a {
            color: white;
            text-decoration: underline;
            font-size: 15px;
        }

        .yellow-strip {
            background-color: rgb(255, 230, 0);
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;

        }

        .yellow-strip p {
            width: 950px;
            color: black;
            font-size: 25px;
            font-weight: bold;
        }
        
        video {
            height: 450px;
        }

    </style>
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <a href="/"><img src="https://www.ultraedit.com/wp-content/uploads/2023/01/UE-Logo-1.webp"
                        alt="UltraEdit"></a>
            </div>
            <div class="nav-menu">
                <ul>
                    <li>
                        <a href="/" for="products">Products</a>
                        <select name="products" id="products"></select>
                    </li>
                    <li>
                        <a href="/">For business</a>
                        <select name="for-business" id="for-business"></select>
                    </li>
                    <li>
                        <a href="/">Resources</a>
                        <select name="resources" id="resources"></select>
                    </li>
                    </li>
                    <li>
                        <a href="/">Support</a>
                        <select name="support" id="support"></select>
                    </li>
                    <li>
                        <a href="/">Our company</a>
                        <select name="our-company" id="our-company"></select>
                    </li>
                    <li>
                        <a href="/"><img src="https://www.ultraedit.com/wp-content/themes/Divi_Child/img/Lang.png"
                                alt=""></a>
                    </li>
                    <li>
                        <a href="/"><img src="https://img.icons8.com/?size=100&id=132&format=png&color=000000"
                                alt=""></a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>
    <section>
        <div class="left">
            <div class="hero-logo"><img
                    src="	https://www.ultraedit.com/wp-content/uploads/2023/01/UE_Logo_full_with_white_text-1-3.png"
                    alt="">
                <p>A powerful, configurable text editor capable of hex and code editing. Boasts unrivaled performance in
                    handling large files.</p>
            </div>
            <div class="btns">
                <button class="btn btn1">Download Now</button>
                <button class="btn btn2">Buy Now</button>
            </div>
            <p class="updates"><a href="/">Read the latest updates</a></p>
        </div>
        <div class="right">
            <video src="https://www.ultraedit.com/wp-content/uploads/2023/01/SQL-Demo-Zoomed-Compressed-1.mp4" autoplay loop controls width="650" height="650"></video>
        </div>
    </section>
    <div class="yellow-strip">
        <p>The Swiss army knife of text editors. World class performance and reliability.</p>
    </div>
</body>

</html>
